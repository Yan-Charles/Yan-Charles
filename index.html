<!DOCTYPE html>
<html>

<head>

<title>我的马尔代夫之旅</title>

<style>

body{
margin:0;
font-family:Arial;
background:#e6f7ff;
text-align:center;
}

header{
background-image:url("https://upload.wikimedia.org/wikipedia/commons/6/6e/Maldives_Island.jpg");
background-size:cover;
color:black;
padding:120px 20px;
}

h1{
font-size:50px;
}

.section{
padding:40px;
}

img{
width:300px;
margin:15px;
border-radius:10px;
}

button{
padding:12px 25px;
font-size:18px;
background:#00aaff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#0088cc;
}

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
max-width:900px;
margin:auto;
}

.gallery img{
width:100%;
border-radius:10px;
transition:0.3s;
}
  
.gallery img:hover{
transform:scale(1.1);
}

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
max-width:900px;
margin:auto;
}

.gallery img{
width:100%;
border-radius:10px;
transition:0.3s;
}
  
.gallery img:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<header>

<h1>我的马尔代夫旅行</h1>

<p>世界上最美的海岛天堂</p >

<button onclick="show()">查看旅行感想</button>

<p id="text"></p >

</header>

<div class="section">
  
<h2>美丽的海岛</h2>
  
<div class="gallery">
    
<img src="island.jpg">
<img src="sea.jpg">
<img src="beach.jpg">
  
</div>

</div>

<script>

function show(){

document.getElementById("text").innerText =
"当我站在这片海边的时候，我觉得世界突然安静了。";

}

</script>

</body>

</html>
